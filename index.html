<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro de Dados</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Cadastro 🚀</h1>

      <input type="text" id="nome" placeholder="Seu nome" />
      <input type="number" id="idade" placeholder="Sua idade" />

      <input type="text" id="nome2" placeholder="Nome 2" />
      <input type="number" id="idade2" placeholder="Idade 2" />

      <button onclick="coletarDados()">Enviar</button>

      <div id="resultado"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
